<!DOCTYPE html>
<html>

<head>

    <title>Blog Post</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold">
            ✨ My Blog Platform
        </a>

        <a href="/"
           class="btn btn-light">
            Home
        </a>

    </div>

</nav>

<div class="container mt-5">

    <!-- BLOG CARD -->

    <div class="card shadow-lg border-0 p-5 mb-5">

        <h1 class="fw-bold text-primary">
            {{ post.title }}
        </h1>

        <hr>

        <p class="fs-5">
            {{ post.content }}
        </p>

    </div>

    <!-- COMMENT SECTION -->

    <div class="card shadow border-0 p-4 mb-4">

        <h3 class="mb-4">
            💬 Add Comment
        </h3>

        <form method="POST"
              action="/add-comment/{{ post.id }}">

            <textarea name="text"
                      rows="4"
                      class="form-control mb-3"
                      placeholder="Write your comment here..."
                      required></textarea>

            <button type="submit"
                    class="btn btn-primary px-4">
                Post Comment
            </button>

        </form>

    </div>

    <!-- SHOW COMMENTS -->

    <h3 class="mb-4">
        🌸 Comments
    </h3>

    {% for comment in comments %}

    <div class="card shadow-sm border-0 p-3 mb-3 comment-box">

        <p class="mb-0">
            {{ comment.text }}
        </p>

    </div>

    {% else %}

    <p class="text-muted">
        No comments yet.
    </p>

    {% endfor %}

</div>

</body>

</html>
